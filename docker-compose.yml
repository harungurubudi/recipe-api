version: '3.8'

services:
  recipe-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recipe-api
    profiles: [app]
    ports:
      - ${APP_PORT}:3000
    env_file:
    - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    networks:
      - recipe-network
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: recipe-mysql
    profiles: [app, development]
    ports:
      - "${DATABASE_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
    networks:
      - recipe-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - .docker/mysql/data:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  recipe-network:
    driver: bridge
    name: recipe-network
